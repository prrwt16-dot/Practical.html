<!-- Registration form -->
 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resgistration from</title>
</head>
<body>
    <h2>Collage Resgistration form</h2>
    <form>
    <label> Enter your first name </label>
    <input type="text" name="name" id="name" placeholder="Enter your first name" value="">
    <br>
    <label> Enter your last name</label>
    <input type="text" name="name" id="name" value="">
    <br>
    <label> Enter your password</label>
    <input type="password" name="password" id="password" value="">
    <br>
    <label>Re- Enter your password</label>
    <input type="password" name="confirm" id="confirm" value="">
    <br>
    <label>Enter your email</label>
    <input type="email" name="email" id="email" value="">
    <br>
    <label>enter your mobile number</label>
    <input type="tel" name="mobile" id="mobile" value="">
    <br>
    <label> Enter your address</label>
    <input type="textarea" row="6" col="7"></textarea>
    <br>
    <label>Select your gender</label>
    <input type="radio" name="gender" id="male" value="male"><span>Male</span>
    <input type="radio" name="gender" id="female" value="female"><span>Female</span>
    <br>
    <label>Enter your Date of Birth</label>
    <input type="date" name="dob" id="dob" value="">
    <br>
    <label> Select your country</label>
    <select name="country" id="country">
        <option value="">...Select your country...</option>
        <option value="India">India</option>
        <option value="Japan">Japan</option>
        <option value="France">France</option>
        <option value="Germany">Germany</option>

    </select>
    <br>
    <label> Upload image</label>
    <input type="file" name="fileupload" id="fileupload" value="fileupload">
    <br>
    <input type="submit" name="sumbit" id="sumbit" value="Register">
    <input type="submit" name="reset" id="reset" value="Reset">
</form>
</body>
</html>
